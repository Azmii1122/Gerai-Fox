<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Checkout - HubBite</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f8fafc; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: #fff; border-radius: 1rem; width: 100%; max-width: 450px; padding: 2rem; border: 1px solid #e2e8f0; }
        .row { display: flex; justify-content: space-between; border-bottom: 1px dashed #e2e8f0; padding: 0.75rem 0; }
        .btn { width: 100%; background: #16a34a; color: #fff; border: none; padding: 1rem; border-radius: 1rem; font-weight: 700; margin-top: 1.5rem; cursor: pointer; font-size: 1rem; }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="text-align:center; margin-bottom: 1.5rem;">Konfirmasi Pembayaran</h2>
        <div id="c-list"></div>
        <div style="display:flex; justify-content:space-between; font-weight:700; font-size:1.2rem; margin-top:1rem; padding-top:1rem; border-top:2px solid #f1f5f9;">
            <span>Total Bayar</span><span id="c-total">Rp 0</span>
        </div>
        <button class="btn" onclick="bayarSekarang()">Bayar & Antre Sekarang</button>
    </div>

    <script>
        // ⬇️ SESUAIKAN URL API KAMU DI SINI ⬇️
        const API_KEY = '12345';
        const API_CART = 'http://localhost/Gerai-Fox/Backend/API/cart_api.php';
        const API_CHECKOUT = 'http://localhost/Gerai-Fox/Backend/API/checkout_api.php';

        document.addEventListener('DOMContentLoaded', () => {
            fetch(API_CART, { headers: { 'X-API-KEY': API_KEY } })
            .then(res => res.json()).then(res => {
                const list = document.getElementById('c-list');
                let total = 0; list.innerHTML = '';
                if(res.status === 'success' && res.data.length > 0) {
                    res.data.forEach(i => {
                        const sub = i.price * i.quantity; total += sub;
                        list.innerHTML += `<div class="row"><span>${i.name} (${i.quantity}x)</span><span style="font-weight:600;">Rp ${sub.toLocaleString('id-ID')}</span></div>`;
                    });
                    document.getElementById('c-total').innerText = 'Rp ' + total.toLocaleString('id-ID');
                }
            });
        });

        function bayarSekarang() {
            fetch(API_CHECKOUT, { method: 'POST', headers: { 'X-API-KEY': API_KEY } })
            .then(res => res.json()).then(res => {
                if(res.status === 'success') { alert("Berhasil!"); window.location.href='home.html'; }
                else { alert(res.message); }
            });
        }
    </script>
</body>
</html>
