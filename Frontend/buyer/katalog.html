<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Katalog - HubBite</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* Menggunakan CSS yang sama persis seperti home.html */
        :root { --fox-500: #f97316; --fox-600: #ea580c; --slate-50: #f8fafc; --slate-200: #e2e8f0; --slate-500: #64748b; --slate-800: #1e293b; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--slate-50); color: var(--slate-800); }
        .navbar { background: #fff; padding: 1rem 2rem; border-bottom: 1px solid var(--slate-200); display: flex; justify-content: space-between; position: sticky; top: 0; z-index: 50; }
        .logo { font-size: 1.5rem; font-weight: 700; color: var(--fox-500); text-decoration: none; }
        
        .container { max-width: 1200px; margin: 2rem auto; display: flex; gap: 2rem; padding: 0 1rem; }
        .main-content { flex: 1; }
        
        /* Banner Toko Spesifik */
        .m-banner { background: #fff; border: 1px solid var(--slate-200); border-radius: 1rem; padding: 1.5rem; display: flex; gap: 1.5rem; align-items: center; margin-bottom: 2rem; }
        .m-img { width: 120px; height: 120px; border-radius: 1rem; background: #e2e8f0; background-size: cover; background-position: center; }
        .m-tags { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 0.5rem; }
        .tag { padding: 0.25rem 0.5rem; border-radius: 0.5rem; font-size: 0.75rem; font-weight: 700; border: 1px solid; display: flex; align-items: center; gap: 0.3rem; }

        /* Grid Menu */
        .p-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1.5rem; }
        .p-card { background: #fff; border: 1px solid var(--slate-200); border-radius: 1rem; padding: 1rem; display: flex; flex-direction: column; }
        .p-img { width: 100%; height: 140px; border-radius: 0.75rem; background: #e2e8f0; background-size: cover; background-position: center; margin-bottom: 1rem; }
        .p-name { font-weight: 700; font-size: 1.05rem; }
        .p-desc { font-size: 0.8rem; color: var(--slate-500); margin: 0.5rem 0 1rem 0; height: 35px; overflow: hidden; }
        .p-bot { display: flex; justify-content: space-between; align-items: center; margin-top: auto; }
        .btn-add { background: var(--fox-500); color: #fff; border: none; width: 34px; height: 34px; border-radius: 0.5rem; cursor: pointer; }

        /* Cart Sidebar */
        .cart-panel { width: 350px; background: #fff; border: 1px solid var(--slate-200); border-radius: 1rem; padding: 1.5rem; position: sticky; top: 100px; display: flex; flex-direction: column; max-height: calc(100vh - 120px); }
        .c-items { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 1rem; margin: 1rem 0; }
        .c-item { display: flex; justify-content: space-between; border-bottom: 1px dashed var(--slate-200); padding-bottom: 0.5rem; }
        .btn-checkout { background: var(--fox-500); color: #fff; border: none; padding: 1rem; border-radius: 1rem; font-weight: 700; cursor: pointer; width: 100%; }
    </style>
</head>
<body>

    <header class="navbar">
        <a href="home.html" class="logo"><i class="fa-solid fa-fire-flame-curved"></i> HubBite</a>
        <div style="font-weight:600;"><a href="home.html" style="color:var(--slate-800); text-decoration:none;">Kembali ke Beranda</a></div>
    </header>

    <div class="container">
        <main class="main-content">
            <div id="merchantBanner" class="m-banner">Memuat Toko...</div>
            <h3 style="margin-bottom: 1rem;">Menu Tersedia</h3>
            <div id="productGrid" class="p-grid">Memuat Menu...</div>
        </main>

        <aside class="cart-panel">
            <h3 style="border-bottom:1px solid var(--slate-200); padding-bottom:1rem;">Keranjang Belanja</h3>
            <div class="c-items" id="cartList"></div>
            <div>
                <div style="display:flex; justify-content:space-between; font-weight:700; margin-bottom:1rem;">
                    <span>Total</span><span id="cartTotal">Rp 0</span>
                </div>
                <button class="btn-checkout" onclick="window.location.href='checkout.html'">Lanjut Checkout</button>
            </div>
        </aside>
    </div>

    <script>
        // ⬇️ SESUAIKAN URL API KAMU DI SINI ⬇️
        const API_KEY = '12345';
        const API_KATALOG = 'http://localhost/Gerai-Fox/Backend/API/katalog_api.php';
        const API_CART = 'http://localhost/Gerai-Fox/Backend/API/cart_api.php';

        const merchantId = new URLSearchParams(window.location.search).get('id') || 1;

        document.addEventListener('DOMContentLoaded', () => {
            // Tarik Murni Data Katalog
            fetch(`${API_KATALOG}?id=${merchantId}`, { headers: { 'X-API-KEY': API_KEY } })
            .then(res => { if(res.status === 403) window.location.href='../auth/login.html'; return res.json(); })
            .then(res => {
                if(res.status === 'success') {
                    const m = res.merchant;
                    
                    let crowdTag = '';
                    if(m.live_crowd === 'ramai') crowdTag = `<div class="tag" style="background:#fef2f2; color:#dc2626; border-color:#fecaca;"><i class="fa-solid fa-fire"></i> Ramai</div>`;
                    else if(m.live_crowd === 'sepi') crowdTag = `<div class="tag" style="background:#f0fdf4; color:#16a34a; border-color:#bbf7d0;"><i class="fa-solid fa-circle-check"></i> Sepi</div>`;
                    else if(m.live_crowd === 'sedang') crowdTag = `<div class="tag" style="background:#fefce8; color:#f59e0b; border-color:#fef08a;"><i class="fa-solid fa-users"></i> Sedang</div>`;

                    let delivTag = (m.is_delivery == 1) ? `<div class="tag" style="background:#eff6ff; color:#2563eb; border-color:#bfdbfe;"><i class="fa-solid fa-motorcycle"></i> Bisa Delivery</div>` : '';

                    document.getElementById('merchantBanner').innerHTML = `
                        <div class="m-img" style="background-image: url('${m.image || ''}');"></div>
                        <div>
                            <h1 style="font-size:1.75rem;">${m.store_name}</h1>
                            <p style="color:#64748b;">${m.description || ''}</p>
                            <div class="m-tags">
                                <div class="tag" style="background:#fffbeb; color:#d97706; border-color:#fde68a;"><i class="fa-solid fa-star"></i> ${m.rating || '-'}</div>
                                ${crowdTag} ${delivTag}
                            </div>
                        </div>
                    `;

                    const grid = document.getElementById('productGrid');
                    grid.innerHTML = '';
                    res.products.forEach(p => {
                        grid.innerHTML += `
                            <div class="p-card">
                                <div class="p-img" style="background-image: url('${p.image || ''}');"></div>
                                <div class="p-name">${p.name}</div>
                                <div class="p-desc">${p.description || ''}</div>
                                <div class="p-bot">
                                    <div style="font-weight:700; color:var(--fox-600);">Rp ${parseInt(p.price).toLocaleString('id-ID')}</div>
                                    <button class="btn-add" onclick="addToCart(${p.product_id})"><i class="fa-solid fa-plus"></i></button>
                                </div>
                            </div>
                        `;
                    });
                }
            });

            loadCart();
        });

        // Manajemen Keranjang
        function loadCart() {
            fetch(API_CART, { headers: { 'X-API-KEY': API_KEY } })
            .then(res => res.json()).then(res => {
                const list = document.getElementById('cartList');
                let total = 0; list.innerHTML = '';
                if(res.status === 'success' && res.data.length > 0) {
                    res.data.forEach(item => {
                        total += (item.price * item.quantity);
                        list.innerHTML += `<div class="c-item">
                            <span style="font-weight:700; color:var(--fox-500);">${item.quantity}x</span>
                            <div style="flex:1; margin-left:10px;">
                                <div style="font-weight:600;">${item.name}</div>
                                <div style="font-size:0.85rem; font-weight:700;">Rp ${parseInt(item.price).toLocaleString('id-ID')}</div>
                            </div>
                        </div>`;
                    });
                    document.getElementById('cartTotal').innerText = 'Rp ' + total.toLocaleString('id-ID');
                } else {
                    list.innerHTML = '<p style="text-align:center; color:#94a3b8;">Kosong</p>';
                }
            });
        }

        function addToCart(pId) {
            fetch(API_CART, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'X-API-KEY': API_KEY },
                body: JSON.stringify({ product_id: pId, merchant_id: merchantId })
            }).then(res => res.json()).then(res => { if(res.status === 'success') loadCart(); });
        }
    </script>
</body>
</html>
