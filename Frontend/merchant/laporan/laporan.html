<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laporan Keuangan - Gerai Fox</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-orange-50 text-slate-800 font-sans p-8">

    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-3xl font-bold text-slate-900">Laporan Keuangan</h1>
                <p class="text-slate-500">lihat laporan keuangan Anda di sini</p>
            </div>
            <a href="/Gerai-Fox/Frontend/merchant/dashboard.html" class="bg-white border-2 border-orange-200 hover:bg-orange-100 hover:border-orange-300 px-5 py-2 rounded-lg font-bold text-orange-600 transition-colors shadow-sm flex items-center gap-2">
                <span>←</span> Kembali ke Dashboard
            </a>
        </div>

        <div class="grid grid-cols-3 gap-6 mb-8">
            <div class="bg-white p-6 rounded-xl shadow-sm border border-orange-100">
                <p class="text-slate-500 font-semibold mb-1">Total Pendapatan (Kotor)</p>
                <h2 class="text-3xl font-bold text-green-500" id="stat-revenue">Rp 0</h2>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm border border-orange-100">
                <p class="text-slate-500 font-semibold mb-1">Total Pengeluaran</p>
                <h2 class="text-3xl font-bold text-red-500" id="stat-expense">Rp 0</h2>
            </div>
            <div class="bg-gradient-to-r from-orange-500 to-orange-400 text-white p-6 rounded-xl shadow-md border border-orange-600">
                <p class="text-orange-100 font-semibold mb-1">Keuntungan Bersih (Profit)</p>
                <h2 class="text-4xl font-bold" id="stat-profit">Rp 0</h2>
            </div>
        </div>

        <div class="grid grid-cols-3 gap-8">
            <div class="col-span-1 bg-white p-6 rounded-xl shadow-sm border border-orange-100 h-fit">
                <h3 class="text-xl font-bold text-slate-800 mb-4">Catat Pengeluaran</h3>
                <form id="form-expense" onsubmit="catatPengeluaran(event)">
                    <div class="mb-4">
                        <label class="block text-sm font-semibold text-slate-600 mb-1">Deskripsi / Keterangan</label>
                        <input type="text" id="input-desc" placeholder="Contoh: Beli Ayam 2kg" required class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:border-orange-500 focus:ring-1 focus:ring-orange-500">
                    </div>
                    <div class="mb-6">
                        <label class="block text-sm font-semibold text-slate-600 mb-1">Nominal (Rp)</label>
                        <input type="number" id="input-amount" placeholder="Contoh: 70000" required class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:border-orange-500 focus:ring-1 focus:ring-orange-500">
                    </div>
                    <button type="submit" class="w-full bg-orange-500 hover:bg-orange-600 text-white font-bold py-2 px-4 rounded-lg transition-colors shadow-sm">
                        Simpan Pengeluaran
                    </button>
                </form>
            </div>

            <div class="col-span-2 bg-white rounded-xl shadow-sm overflow-hidden border border-orange-100">
                <div class="p-6 border-b border-orange-100 flex justify-between items-center bg-orange-50/50">
                    <h3 class="text-lg font-bold text-slate-800">Riwayat Pengeluaran Operasional</h3>
                </div>
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-orange-50 text-orange-800 text-sm border-b border-orange-100">
                            <th class="p-4 font-semibold">Tanggal</th>
                            <th class="p-4 font-semibold">Deskripsi Pengeluaran</th>
                            <th class="p-4 font-semibold">Nominal</th>
                        </tr>
                    </thead>
                    <tbody id="table-expenses">
                        <tr><td colspan="3" class="p-4 text-center text-slate-500">Memuat data...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost/Gerai-Fox/Backend/API/laporan.php'; // API untuk laporan keuangan

        const formatRupiah = (angka) => {
            return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(angka);
        };

        function loadLaporan() {
            fetch(API_URL)
                .then(response => response.json())
                .then(res => {
                    if (res.status === 'success') {
                        document.getElementById('stat-revenue').innerText = formatRupiah(res.data.revenue);
                        document.getElementById('stat-expense').innerText = formatRupiah(res.data.total_expense);
                        document.getElementById('stat-profit').innerText = formatRupiah(res.data.profit);

                        if (res.data.profit < 0) {
                            document.getElementById('stat-profit').classList.remove('text-white');
                            document.getElementById('stat-profit').classList.add('text-red-900');
                        }

                        renderTable(res.data.expenses_list);
                    }
                })
                .catch(err => console.error("Error GET:", err));
        }

        function renderTable(data) {
            const tbody = document.getElementById('table-expenses');
            tbody.innerHTML = '';

            if(data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="3" class="p-4 text-center text-slate-500 italic">Belum ada pengeluaran tercatat.</td></tr>';
                return;
            }

            data.forEach(item => {
                const tr = document.createElement('tr');
                tr.className = 'border-b border-orange-50 hover:bg-orange-50/50 text-sm';
                tr.innerHTML = `
                    <td class="p-4 text-slate-500">${item.expense_date}</td>
                    <td class="p-4 font-medium text-slate-700">${item.description}</td>
                    <td class="p-4 font-bold text-red-500">- ${formatRupiah(item.amount)}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        function catatPengeluaran(event) {
            event.preventDefault(); 
            const desc = document.getElementById('input-desc').value;
            const amount = document.getElementById('input-amount').value;

            fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ description: desc, amount: amount })
            })
            .then(response => response.json())
            .then(res => {
                if (res.status === 'success') {
                    alert("Pengeluaran berhasil dicatat!");
                    document.getElementById('form-expense').reset();
                    loadLaporan(); 
                } else {
                    alert("Gagal: " + res.message);
                }
            })
            .catch(err => console.error("Error POST:", err));
        }

        window.onload = loadLaporan;
    </script>
</body>
</html>
