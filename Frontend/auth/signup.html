<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gabung GeraiFox</title>
    <style>
        :root {
    /* Identitas Warna Gerai.Fox yang teduh & elegan */
    --primary-dark: #CC5500; 
    --primary-light: #FF9500; 
    --accent-color: #E86A10;
    
    --bg-main: #F4F7FE; 
    --text-dark: #1B2559; 
    --text-muted: #A3AED0; 
    --input-bg: #F4F7FE;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Plus Jakarta Sans', 'Inter', sans-serif; 
}

body {
    background: var(--bg-main);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
}

/* Floating Container Utama */
.main-wrapper {
    display: flex;
    width: 100%;
    max-width: 950px; /* Sedikit lebih lebar untuk mengakomodasi form grid */
    height: 600px; /* Sedikit lebih tinggi untuk form daftar */
    background: #FFFFFF;
    border-radius: 30px; 
    overflow: hidden;
    box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08); 
}

/* --- SISI KIRI: PANEL HERO --- */
.info-panel {
    flex: 1;
    background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary-light) 100%);
    padding: 50px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    color: white;
    position: relative;
    overflow: hidden;
}

/* Ornamen lingkaran halus */
.info-panel::before {
    content: "";
    position: absolute;
    bottom: -100px;
    left: -50px;
    width: 300px;
    height: 300px;
    background: radial-gradient(circle, rgba(255,255,255,0.15) 0%, rgba(255,255,255,0) 70%);
    border-radius: 50%;
}

.info-panel::after {
    content: "";
    position: absolute;
    top: -50px;
    right: -50px;
    width: 250px;
    height: 250px;
    background: rgba(255, 255, 255, 0.08);
    filter: blur(40px);
    border-radius: 50%;
}

.brand-name {
    font-size: 1.2rem;
    font-weight: 800;
    letter-spacing: 2px;
    z-index: 2;
}

.hero-text {
    z-index: 2;
    margin-top: -30px;
}

.hero-text h1 {
    font-size: 2.4rem;
    font-weight: 800;
    line-height: 1.1;
    margin-bottom: 20px;
    letter-spacing: -1px;
}

.hero-text p {
    color: rgba(255, 255, 255, 0.85);
    font-size: 0.95rem;
    line-height: 1.6;
}

.footer-note {
    z-index: 2;
    opacity: 0.8;
}

/* --- SISI KANAN: FORM DAFTAR --- */
.form-panel {
    flex: 1.3; /* Beri sedikit ruang ekstra untuk form yang lebih panjang */
    padding: 50px 60px;
    background: white;
    display: flex;
    flex-direction: column;
    justify-content: center;
}

.form-header {
    margin-bottom: 30px;
}

.form-header h2 {
    font-size: 2rem;
    font-weight: 800;
    color: var(--text-dark);
    margin-bottom: 8px;
    letter-spacing: -0.5px;
}

.form-header p {
    color: var(--text-muted);
    font-size: 0.85rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
}

.form-group {
    margin-bottom: 15px;
}

.form-group label {
    display: block;
    font-size: 0.75rem;
    font-weight: 700;
    color: var(--text-muted);
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 1px;
}

/* Style Input yang Bulat dan Bersih */
.form-group input {
    width: 100%;
    padding: 14px 20px;
    border: 2px solid transparent;
    border-radius: 16px; 
    font-size: 0.95rem;
    color: var(--text-dark);
    font-weight: 500;
    background: var(--input-bg);
    transition: all 0.3s ease;
}

.form-group input::placeholder {
    color: #CBD5E1;
}

.form-group input:focus {
    outline: none;
    background: white;
    border-color: var(--primary-light);
    box-shadow: 0 10px 20px rgba(232, 106, 16, 0.1);
}

/* Tombol Daftar dengan Gradasi */
.btn-register {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, var(--primary-dark), var(--primary-light));
    color: white;
    border: none;
    border-radius: 16px;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.3s ease;
    margin-top: 15px;
    box-shadow: 0 10px 20px rgba(204, 85, 0, 0.25); 
}

.btn-register:hover {
    transform: translateY(-3px);
    box-shadow: 0 15px 25px rgba(204, 85, 0, 0.35);
}

.login-link {
    text-align: center;
    margin-top: 25px;
    font-size: 0.85rem;
    color: var(--text-muted);
    font-weight: 600;
}

.login-link a {
    color: var(--accent-color);
    text-decoration: none;
    font-weight: 800;
    margin-left: 5px;
}

/* Responsif untuk layar HP */
@media (max-width: 850px) {
    .main-wrapper {
        flex-direction: column;
        height: auto;
        max-width: 450px;
    }
    .info-panel {
        padding: 40px;
        min-height: 200px;
        border-radius: 30px 30px 0 0; 
    }
    .form-panel {
        padding: 40px;
    }
    /* Mematikan grid agar bersusun ke bawah di layar HP */
    div[style*="display: grid"] {
        grid-template-columns: 1fr !important;
        gap: 0 !important;
    }
}
    </style>
</head>
<body>

    <main class="main-wrapper">
        <!-- Bagian Kiri: Info Imersif -->
        <section class="info-panel">
            <div class="brand-name">GERAI.FOX</div>
            <div class="hero-text">
                <h1>Satu platform,<br>berbagai kemudahan.</h1>
                <p>Nikmati akses eksklusif ke berbagai layanan mahasiswa dalam satu genggaman digital.</p>
            </div>
            <div class="footer-note" style="font-size: 0.8rem; color: #64748b;">
                &copy; 2026 Gerai.Fox Project
            </div>
        </section>

        <!-- Bagian Kanan: Form -->
        <section class="form-panel">
            <div class="form-header">
                <h2>Buat Akun</h2>
                <p>Mulai perjalanan digitalmu hari ini.</p>
            </div>

            <form action="../../Backend/auth-system/daftar.php" method="POST">
                <div class="form-group">
                    <label for="fullname">Nama Lengkap</label>
                    <input type="text" id="fullname" name="fullname" placeholder="John Doe" required>
                </div>

                <div class="form-group">
                    <label for="email">Alamat Email</label>
                    <input type="email" id="email" name="email" placeholder="nama@email.com" required>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div class="form-group">
                        <label for="username">Username</label>
                        <input type="text" id="username" name="username" placeholder="johndoe" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" placeholder="••••••••" required>
                    </div>
                </div>

                <button type="submit" class="btn-register" name="register">Daftar Sekarang</button>

                <p class="login-link">
                    Sudah punya akun? <a href="login.html">Masuk</a>
                </p>
            </form>
        </section>
    </main>

    

</body>
</html>
