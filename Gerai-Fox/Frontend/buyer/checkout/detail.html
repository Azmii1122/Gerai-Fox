<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - gerai.fox</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        /* ==================== CSS NATIVE (Reset & Base) ==================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f9fafb;
            color: #1f2937;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        /* Container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* Navbar Header Minimalis */
        .header {
            background-color: #ffffff;
            border-bottom: 1px solid #e5e7eb;
            padding: 20px 0;
            text-align: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: #111827;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .logo-icon {
            background-color: #ffedd5;
            color: #ea580c;
            padding: 8px;
            border-radius: 50%;
            display: flex;
        }

        .text-orange { color: #ea580c; }

        /* ==================== CHECKOUT LAYOUT ==================== */
        .checkout-grid {
            display: grid;
            grid-template-columns: 3fr 2fr;
            gap: 40px;
            align-items: start;
        }

        /* Form Kiri */
        .checkout-section {
            background-color: #ffffff;
            padding: 32px;
            border-radius: 16px;
            border: 1px solid #e5e7eb;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .section-title {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 24px;
            color: #111827;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 600;
            color: #4b5563;
            margin-bottom: 8px;
        }

        input[type="text"],
        input[type="email"],
        select,
        textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-family: inherit;
            font-size: 1rem;
            color: #1f2937;
            transition: all 0.2s;
            background-color: #f9fafb;
        }

        input:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: #ea580c;
            background-color: #ffffff;
            box-shadow: 0 0 0 3px #ffedd5;
        }

        /* Order Summary (Kanan) */
        .order-summary {
            background-color: #ffffff;
            padding: 32px;
            border-radius: 16px;
            border: 1px solid #ea580c; /* Aksen oranye untuk penekanan */
            box-shadow: 0 10px 15px -3px rgba(234, 88, 12, 0.1);
            position: sticky;
            top: 20px;
        }

        .cart-items {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 24px;
            max-height: 400px;
            overflow-y: auto;
            padding-right: 8px;
        }

        /* Custom Scrollbar */
        .cart-items::-webkit-scrollbar { width: 6px; }
        .cart-items::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        .cart-items::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }

        .cart-item {
            display: flex;
            gap: 16px;
            padding-bottom: 16px;
            border-bottom: 1px solid #f3f4f6;
        }

        .item-img {
            width: 80px;
            height: 80px;
            border-radius: 8px;
            background-color: #f3f4f6;
            object-fit: cover;
        }

        .item-details { flex: 1; }
        
        .item-name {
            font-weight: 600;
            color: #111827;
            margin-bottom: 4px;
        }

        .item-price {
            color: #ea580c;
            font-weight: 700;
            font-size: 0.875rem;
        }

        /* Qty Control (Method PUT) & Delete (Method DELETE) */
        .item-actions {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 12px;
        }

        .qty-control {
            display: flex;
            align-items: center;
            border: 1px solid #e5e7eb;
            border-radius: 6px;
            overflow: hidden;
        }

        .qty-btn {
            background: none;
            border: none;
            padding: 4px 12px;
            cursor: pointer;
            color: #4b5563;
            transition: background 0.2s;
        }

        .qty-btn:hover { background-color: #f3f4f6; color: #ea580c; }
        
        .qty-display {
            padding: 4px 12px;
            font-size: 0.875rem;
            font-weight: 600;
            border-left: 1px solid #e5e7eb;
            border-right: 1px solid #e5e7eb;
        }

        .btn-delete {
            background: none;
            border: none;
            color: #ef4444;
            cursor: pointer;
            padding: 4px;
            border-radius: 4px;
            transition: background 0.2s;
        }

        .btn-delete:hover { background-color: #fef2f2; }

        /* Totals */
        .summary-totals {
            margin-top: 24px;
            padding-top: 24px;
            border-top: 2px dashed #e5e7eb;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            color: #4b5563;
            font-size: 0.875rem;
        }

        .summary-row.total {
            font-size: 1.25rem;
            font-weight: 800;
            color: #111827;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid #e5e7eb;
        }

        .btn-checkout {
            width: 100%;
            background-color: #ea580c;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            padding: 16px;
            border: none;
            border-radius: 12px;
            margin-top: 24px;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .btn-checkout:hover { background-color: #c2410c; }
        .btn-checkout:active { transform: scale(0.98); }

        /* Loader */
        .loader {
            display: none;
            text-align: center;
            padding: 40px;
            color: #6b7280;
        }

        /* ==================== RESPONSIVE ==================== */
        @media (max-width: 992px) {
            .checkout-grid { grid-template-columns: 1fr; }
            .order-summary { position: static; }
        }
        @media (max-width: 600px) {
            .form-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="header">
        <a href="#" class="logo">
            <div class="logo-icon">
                <i data-lucide="shopping-bag" style="width: 24px; height: 24px;"></i>
            </div>
            <span>gerai.<span class="text-orange">fox</span></span>
        </a>
    </header>

    <div class="container">
        <div class="checkout-grid">
            
            <!-- Kiri: Form Data Pengiriman -->
            <form id="formCheckout" onsubmit="processCheckout(event)">
                <div class="checkout-section">
                    <h2 class="section-title">
                        <i data-lucide="map-pin" style="color: #ea580c;"></i> Informasi Pengiriman
                    </h2>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label>Nama Depan</label>
                            <input type="text" id="fname" required placeholder="Cth: Budi">
                        </div>
                        <div class="form-group">
                            <label>Nama Belakang</label>
                            <input type="text" id="lname" required placeholder="Cth: Santoso">
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="email" required placeholder="budi@example.com">
                    </div>

                    <div class="form-group">
                        <label>Alamat Lengkap</label>
                        <textarea id="address" rows="3" required placeholder="Nama Jalan, RT/RW, No Rumah..."></textarea>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Kota</label>
                            <input type="text" id="city" required placeholder="Cth: Jakarta Selatan">
                        </div>
                        <div class="form-group">
                            <label>Kode Pos</label>
                            <input type="text" id="zipcode" required placeholder="12345">
                        </div>
                    </div>

                    <h2 class="section-title" style="margin-top: 24px; border-top: 1px solid #e5e7eb; padding-top: 24px;">
                        <i data-lucide="credit-card" style="color: #ea580c;"></i> Metode Pembayaran
                    </h2>
                    <div class="form-group">
                        <select id="payment" required>
                            <option value="transfer_bank">Transfer Bank (BCA/Mandiri/BNI)</option>
                            <option value="ewallet">E-Wallet (Gopay/OVO/Dana)</option>
                            <option value="cod">Cash on Delivery (COD)</option>
                        </select>
                    </div>
                </div>
            </form>

            <!-- Kanan: Order Summary -->
            <div class="order-summary">
                <h2 class="section-title">Ringkasan Pesanan</h2>
                
                <div id="loader" class="loader">
                    <i data-lucide="loader" class="spin" style="width: 24px; height: 24px; animation: spin 1s linear infinite;"></i>
                    <p>Memuat keranjang...</p>
                </div>

                <!-- List Produk akan di render via JS -->
                <div class="cart-items" id="cartContainer">
                    <!-- Item template js -->
                </div>

                <div class="summary-totals">
                <div class="summary-row">
                    <span>Subtotal</span>
                    <span id="subtotalLabel">Rp 0</span>
                </div>
                <div class="summary-row">
                    <span>Biaya Pengiriman</span>
                    <span>Rp 20.000</span>
                </div>
                <div class="summary-row total">
                    <span>Total Bayar</span>
                    <span id="totalLabel" class="text-orange">Rp 0</span>
                </div>
            </div>

            <button type="submit" form="formCheckout" class="btn-checkout" id="btnSubmit">
                <i data-lucide="lock" style="width: 18px; height: 18px;"></i>
                Bayar Sekarang
            </button>
        </div>
    </div>
</div>

<script>
    // Inisialisasi icon
    lucide.createIcons();

    // Base URL untuk API PHP (Pastikan file checkout_api.php ada di folder yang sama saat di localhost)
    const API_URL = 'checkout_api.php';

    // Format Uang Rupiah
    const formatRupiah = (number) => {
        return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(number);
    };

    // --- SIMULASI DATABASE LOKAL (Mencegah Error di Preview) ---
    // Fungsi ini digunakan agar UI tetap interaktif tanpa error console saat tidak ada server PHP
    function getMockCart() {
        const stored = localStorage.getItem('fox_cart');
        if (stored) return JSON.parse(stored);
        const initial = [
            { id: 1, name: "Ayam Geprek", price: 9000, qty: 2, img: "ayam geprek.jpg" },
            { id: 2, name: "ES teh manis", price: 5000, qty: 1, img: "es teh manis.png" }
        ];
        localStorage.setItem('fox_cart', JSON.stringify(initial));
        return initial;
    }

    function saveMockCart(cart) {
        localStorage.setItem('fox_cart', JSON.stringify(cart));
    }

    // ==========================================
    // 1. METHOD GET: Mengambil Data Keranjang
    // ==========================================
    async function fetchCart() {
        document.getElementById('loader').style.display = 'block';
        document.getElementById('cartContainer').innerHTML = '';
        
        try {
            const response = await fetch(API_URL);
            if (!response.ok) throw new Error("API tidak terjangkau");
            const result = await response.json();
            
            if(result.status === 'success') {
                renderCart(result.cart, result.subtotal);
            }
        } catch (error) {
            // Fallback tanpa console.error berwarna merah
            console.log("Menjalankan mode simulasi lokal (Tanpa server PHP)...");
            const mockCart = getMockCart();
            const subtotal = mockCart.reduce((sum, item) => sum + (item.price * item.qty), 0);
            setTimeout(() => {
                renderCart(mockCart, subtotal);
            }, 400); // Simulasi delay jaringan
        } finally {
            setTimeout(() => {
                document.getElementById('loader').style.display = 'none';
            }, 400);
        }
    }

    // Render HTML keranjang
    function renderCart(items, subtotal) {
            const container = document.getElementById('cartContainer');
            container.innerHTML = '';
            
            if(items.length === 0) {
                container.innerHTML = '<p style="text-align:center; color:#6b7280;">Keranjang kosong.</p>';
                document.getElementById('btnSubmit').disabled = true;
                return;
            }

            document.getElementById('btnSubmit').disabled = false;

            items.forEach(item => {
                const itemEl = document.createElement('div');
                itemEl.className = 'cart-item';
                itemEl.innerHTML = `
                    <img src="${item.img}" class="item-img" alt="${item.name}">
                    <div class="item-details">
                        <div class="item-name">${item.name}</div>
                        <div class="item-price">${formatRupiah(item.price)}</div>
                        <div class="item-actions">
                            <div class="qty-control">
                                <button type="button" class="qty-btn" onclick="updateQty(${item.id}, ${item.qty - 1})">-</button>
                                <span class="qty-display">${item.qty}</span>
                                <button type="button" class="qty-btn" onclick="updateQty(${item.id}, ${item.qty + 1})">+</button>
                            </div>
                            <button type="button" class="btn-delete" onclick="deleteItem(${item.id})" title="Hapus Barang">
                                <i data-lucide="trash-2" style="width: 18px; height: 18px;"></i>
                            </button>
                        </div>
                    </div>
                `;
                container.appendChild(itemEl);
            });

            // Update icon baru
        lucide.createIcons();

        // Update Total
        document.getElementById('subtotalLabel').innerText = formatRupiah(subtotal);
        document.getElementById('totalLabel').innerText = formatRupiah(subtotal + 20000); // + ongkir 20k
    }

    // ==========================================
    // 2. METHOD PUT: Mengubah Jumlah Barang
    // ==========================================
    async function updateQty(id, newQty) {
        if (newQty < 1) return; // minimal 1
        
        try {
            // Method PUT digunakan untuk 'UPDATE' data spesifik
            const response = await fetch(API_URL, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id: id, qty: newQty })
            });
            if (!response.ok) throw new Error("API tidak terjangkau");
            const result = await response.json();
            if(result.status === 'success') fetchCart(); // Refresh cart
        } catch (error) {
            // Simulasi fungsionalitas di browser
            let cart = getMockCart();
            const itemIndex = cart.findIndex(i => i.id === id);
            if(itemIndex > -1) {
                cart[itemIndex].qty = newQty;
                saveMockCart(cart);
            }
            fetchCart();
        }
    }

    // ==========================================
    // 3. METHOD DELETE: Menghapus Barang
    // ==========================================
    async function deleteItem(id) {
        const confirmDelete = confirm("Hapus barang ini dari keranjang?");
        if (!confirmDelete) return;

        try {
            // Method DELETE digunakan untuk 'MENGHAPUS' data
            const response = await fetch(API_URL, {
                method: 'DELETE',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id: id })
            });
            if (!response.ok) throw new Error("API tidak terjangkau");
            const result = await response.json();
            if(result.status === 'success') fetchCart(); // Refresh cart
        } catch (error) {
            // Simulasi fungsionalitas di browser
            let cart = getMockCart();
            cart = cart.filter(i => i.id !== id);
            saveMockCart(cart);
            fetchCart();
        }
    }

    // ==========================================
    // 4. METHOD POST: Memproses Checkout
    // ==========================================
    async function processCheckout(event) {
        event.preventDefault(); // Mencegah reload halaman
        
        const btn = document.getElementById('btnSubmit');
        btn.innerHTML = '<i data-lucide="loader" class="spin" style="animation: spin 1s linear infinite;"></i> Memproses...';
        btn.disabled = true;

        // Kumpulkan data form
        const orderData = {
            customer: {
                fname: document.getElementById('fname').value,
                lname: document.getElementById('lname').value,
                email: document.getElementById('email').value,
                address: document.getElementById('address').value,
                city: document.getElementById('city').value,
                zipcode: document.getElementById('zipcode').value,
                payment: document.getElementById('payment').value
            }
        };

        try {
            // Method POST digunakan untuk 'MEMBUAT' pesanan baru
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(orderData)
            });
            if (!response.ok) throw new Error("API tidak terjangkau");
            const result = await response.json();
            
            if(result.status === 'success') {
                alert('Checkout Berhasil! ID Pesanan Anda: ' + result.order_id);
                window.location.href = '#'; // Redirect ke halaman sukses
            }
        } catch (error) {
            // Simulasi fungsionalitas di browser
            setTimeout(() => {
                alert('Simulasi Checkout Berhasil! Terima kasih.');
                localStorage.removeItem('fox_cart'); // Reset keranjang
                fetchCart(); // Refresh UI
                
                btn.innerHTML = '<i data-lucide="lock" style="width: 18px; height: 18px;"></i> Bayar Sekarang';
                btn.disabled = false;
                document.getElementById('formCheckout').reset();
            }, 1500);
        }
    }

    // Inisialisasi saat halaman dimuat
    document.addEventListener('DOMContentLoaded', fetchCart);
</script>
</body>
</html>
